name: garden_pi
description: Real-time smart garden controller (phone app).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  # State management (same patterns as Zenify Trip)
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0
  # Live camera (1.x required for current Flutter — 0.x uses the removed v1 embedding)
  flutter_webrtc: ^1.5.1
  # Charts (history)
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
